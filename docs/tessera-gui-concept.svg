<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #0d0f14; }
      .window { fill: #111318; stroke: #2d3340; stroke-width: 1; }
      .top { fill: #171a21; }
      .panel { fill: #151820; }
      .panel2 { fill: #181c24; }
      .terminal { fill: #101218; stroke: #2b313d; stroke-width: 1; }
      .terminal-active { fill: #11141b; stroke: #e0af68; stroke-width: 3; }
      .muted { fill: #7f8797; font: 18px "Inter", "Noto Sans", sans-serif; }
      .label { fill: #cbd3e3; font: 18px "Inter", "Noto Sans", sans-serif; }
      .small { fill: #9aa4b7; font: 15px "Inter", "Noto Sans", sans-serif; }
      .tiny { fill: #7f8797; font: 13px "Inter", "Noto Sans", sans-serif; }
      .mono { fill: #cbd3e3; font: 16px "JetBrains Mono", "Martian Mono", monospace; }
      .mono-dim { fill: #81899a; font: 15px "JetBrains Mono", "Martian Mono", monospace; }
      .blue { fill: #7aa2f7; }
      .green { fill: #8cc673; }
      .amber { fill: #e0af68; }
      .red { fill: #e84d5b; }
      .line { stroke: #2b313d; stroke-width: 1; }
      .btn { fill: #202633; stroke: #303746; stroke-width: 1; }
      .btn-active { fill: #26344d; stroke: #7aa2f7; stroke-width: 1.5; }
      .btn-save { fill: #254232; stroke: #8cc673; stroke-width: 1.5; }
      .file-selected { fill: #20304a; }
      .file-hover { fill: #1d232d; }
      .tab { fill: #1d222c; stroke: #2d3340; stroke-width: 1; }
      .tab-active { fill: #232b38; stroke: #7aa2f7; stroke-width: 1.5; }
      .shadow { filter: drop-shadow(0 20px 55px rgba(0,0,0,0.42)); }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <rect class="window shadow" x="80" y="60" width="1440" height="880" rx="10"/>

  <!-- Top command bar -->
  <rect class="top" x="80" y="60" width="1440" height="48" rx="10"/>
  <rect class="top" x="80" y="94" width="1440" height="14"/>
  <text class="label" x="108" y="91">Tessera</text>
  <rect class="btn-active" x="212" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="222" y="89">S</text>
  <rect class="btn" x="256" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="267" y="89">+</text>
  <rect class="btn" x="300" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="309" y="89">C</text>
  <rect class="btn" x="344" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="353" y="89">G</text>
  <rect class="btn" x="388" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="397" y="89">E</text>
  <rect class="btn" x="432" y="72" width="34" height="24" rx="5"/>
  <text class="tiny" x="441" y="89">F</text>
  <text class="small" x="620" y="91">4 panes - coding_Space - BridgeShot ready</text>
  <circle cx="1448" cy="84" r="6" fill="#596172"/>
  <circle cx="1472" cy="84" r="6" fill="#e0af68"/>
  <circle cx="1496" cy="84" r="6" fill="#e84d5b"/>

  <!-- Left sidebar -->
  <rect class="panel" x="80" y="108" width="250" height="832"/>
  <line class="line" x1="330" y1="108" x2="330" y2="940"/>
  <text class="small" x="106" y="142">coding_Space</text>
  <rect class="file-selected" x="96" y="160" width="218" height="30" rx="5"/>
  <text class="small" x="116" y="181">src</text>
  <text class="tiny" x="274" y="181">open</text>
  <rect class="file-hover" x="96" y="196" width="218" height="30" rx="5"/>
  <text class="small" x="130" y="217">main.rs</text>
  <text class="tiny" x="272" y="217">rs</text>
  <text class="small" x="130" y="253">app.rs</text>
  <text class="tiny" x="272" y="253">rs</text>
  <text class="small" x="130" y="289">grid.rs</text>
  <text class="tiny" x="272" y="289">rs</text>
  <text class="small" x="116" y="329">README.md</text>
  <text class="small" x="116" y="365">Cargo.toml</text>
  <text class="small" x="116" y="401">docs</text>

  <line class="line" x1="96" y1="742" x2="314" y2="742"/>
  <text class="small" x="106" y="774">Screenshots</text>
  <rect class="panel2" x="106" y="792" width="94" height="64" rx="6"/>
  <rect x="116" y="804" width="74" height="8" rx="2" fill="#7aa2f7"/>
  <rect x="116" y="818" width="52" height="6" rx="2" fill="#81899a"/>
  <rect x="116" y="832" width="68" height="6" rx="2" fill="#2d3340"/>
  <rect class="panel2" x="212" y="792" width="94" height="64" rx="6"/>
  <rect x="222" y="804" width="74" height="8" rx="2" fill="#e0af68"/>
  <rect x="222" y="818" width="38" height="6" rx="2" fill="#81899a"/>
  <rect x="222" y="832" width="62" height="6" rx="2" fill="#2d3340"/>
  <text class="tiny" x="108" y="884">Drag a thumbnail into a terminal</text>

  <!-- Center terminal grid -->
  <rect class="panel2" x="330" y="108" width="790" height="832"/>
  <rect class="terminal-active" x="350" y="128" width="365" height="336" rx="6"/>
  <rect class="terminal" x="735" y="128" width="365" height="336" rx="6"/>
  <rect class="terminal" x="350" y="484" width="365" height="336" rx="6"/>
  <rect class="terminal" x="735" y="484" width="365" height="336" rx="6"/>

  <text class="mono" x="374" y="164">moamen@linux ~/coding_Space</text>
  <text class="mono-dim" x="374" y="196">$ cargo test</text>
  <text class="green mono" x="374" y="230">test result: ok. 16 passed</text>
  <text class="mono-dim" x="374" y="262">$ cargo clippy --all-targets</text>
  <text class="green mono" x="374" y="296">Finished dev profile</text>
  <text class="amber mono" x="374" y="342">active pane</text>

  <text class="mono-dim" x="760" y="164">$ rg preview</text>
  <text class="mono" x="760" y="198">preview.rs: cache_dir()</text>
  <text class="mono" x="760" y="226">editor.rs: build_pages()</text>
  <text class="mono-dim" x="760" y="270">$ git status --short</text>
  <text class="green mono" x="760" y="304">clean</text>

  <text class="mono-dim" x="374" y="524">$ ./target/debug/tessera 4</text>
  <text class="mono" x="374" y="558">GTK4 + VTE workspace</text>
  <text class="mono" x="374" y="590">Alt+h/j/k/l focus</text>
  <text class="mono" x="374" y="622">Alt+z zoom</text>

  <text class="mono-dim" x="760" y="524">$ ls samples/images</text>
  <text class="mono" x="760" y="558">photo.png vector.svg</text>
  <text class="mono" x="760" y="590">report.pdf notes.docx</text>
  <text class="mono-dim" x="760" y="634">$ open README.md</text>

  <!-- BridgeShot toolbar -->
  <rect x="364" y="844" width="720" height="62" rx="8" fill="#171b23" stroke="#303746" stroke-width="1.5"/>
  <text class="small" x="386" y="882">BridgeShot</text>
  <rect class="btn-active" x="500" y="860" width="56" height="30" rx="5"/>
  <text class="tiny" x="516" y="880">Box</text>
  <rect class="btn" x="566" y="860" width="62" height="30" rx="5"/>
  <text class="tiny" x="579" y="880">Arrow</text>
  <rect class="btn" x="638" y="860" width="56" height="30" rx="5"/>
  <text class="tiny" x="653" y="880">Text</text>
  <rect class="btn" x="704" y="860" width="50" height="30" rx="5"/>
  <text class="tiny" x="718" y="880">Pen</text>
  <circle class="red" cx="782" cy="875" r="9"/>
  <circle class="blue" cx="810" cy="875" r="9"/>
  <circle class="amber" cx="838" cy="875" r="9"/>
  <circle class="green" cx="866" cy="875" r="9"/>
  <rect class="btn" x="900" y="860" width="58" height="30" rx="5"/>
  <text class="tiny" x="913" y="880">Undo</text>
  <rect class="btn" x="968" y="860" width="58" height="30" rx="5"/>
  <text class="tiny" x="981" y="880">Clear</text>
  <rect class="btn" x="1040" y="860" width="70" height="30" rx="5"/>
  <text class="tiny" x="1054" y="880">Cancel</text>
  <rect class="btn-save" x="1120" y="860" width="62" height="30" rx="5"/>
  <text class="tiny" x="1137" y="880">Save</text>

  <!-- Right editor panel -->
  <rect class="panel" x="1120" y="108" width="400" height="832"/>
  <line class="line" x1="1120" y1="108" x2="1120" y2="940"/>
  <rect class="tab-active" x="1140" y="128" width="96" height="32" rx="6"/>
  <text class="tiny" x="1156" y="149">main.rs</text>
  <rect class="tab" x="1244" y="128" width="112" height="32" rx="6"/>
  <text class="tiny" x="1258" y="149">README.md</text>
  <rect class="tab" x="1364" y="128" width="112" height="32" rx="6"/>
  <text class="tiny" x="1378" y="149">preview.png</text>

  <rect x="1140" y="176" width="360" height="330" rx="6" fill="#101218" stroke="#2b313d" stroke-width="1"/>
  <text class="mono-dim" x="1160" y="210"> 1  fn main() {</text>
  <text class="mono" x="1160" y="240"> 2      app::build();</text>
  <text class="mono" x="1160" y="270"> 3      theme::install_css();</text>
  <text class="mono-dim" x="1160" y="300"> 4  }</text>
  <text class="mono" x="1160" y="350"> 5  // compact toolbar</text>
  <text class="mono" x="1160" y="380"> 6  // clear active states</text>
  <text class="mono" x="1160" y="410"> 7  // fewer wide gaps</text>

  <rect x="1140" y="530" width="360" height="250" rx="6" fill="#101218" stroke="#2b313d" stroke-width="1"/>
  <rect x="1180" y="570" width="280" height="170" rx="4" fill="#f2f2f7"/>
  <rect x="1210" y="604" width="220" height="16" rx="3" fill="#7aa2f7"/>
  <rect x="1210" y="636" width="176" height="12" rx="3" fill="#81899a"/>
  <rect x="1210" y="664" width="206" height="12" rx="3" fill="#303746"/>
  <path d="M1250 708 L1320 670 L1390 720" fill="none" stroke="#e84d5b" stroke-width="8" stroke-linecap="round"/>
  <text class="small" x="1140" y="822">Design notes</text>
  <text class="tiny" x="1140" y="852">- one clear active color</text>
  <text class="tiny" x="1140" y="878">- screenshot tools grouped</text>
  <text class="tiny" x="1140" y="904">- editor panel uses tabs</text>
</svg>
