<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Tessera application icon</title>
  <desc id="desc">A dark rounded app tile containing a warm orange mosaic grid of terminal panes with a subtle prompt glyph.</desc>

  <defs>
    <linearGradient id="tileSheen" x1="96" y1="58" x2="416" y2="454" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="128%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#05060a" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- App badge -->
  <g id="badge" filter="url(#softShadow)">
    <rect x="48" y="48" width="416" height="416" rx="92" fill="#1a1b26"/>
    <rect x="48" y="48" width="416" height="416" rx="92" fill="url(#tileSheen)"/>
    <rect x="49.5" y="49.5" width="413" height="413" rx="90.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
  </g>

  <!-- Balanced tessera terminal grid -->
  <g id="mosaic-terminal-grid">
    <rect x="116" y="116" width="128" height="88" rx="18" fill="#FF7A18"/>
    <rect x="268" y="116" width="128" height="88" rx="18" fill="#F2660C"/>

    <rect x="116" y="228" width="88" height="88" rx="18" fill="#F2660C"/>
    <rect x="228" y="228" width="168" height="88" rx="18" fill="#E8590C"/>

    <rect x="116" y="340" width="168" height="56" rx="18" fill="#E8590C"/>
    <rect x="308" y="340" width="88" height="56" rx="18" fill="#B8420A"/>

    <path d="M136 148h84" fill="none" stroke="#fff4e8" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
    <path d="M288 148h84" fill="none" stroke="#fff4e8" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
    <path d="M248 260h124" fill="none" stroke="#fff4e8" stroke-opacity="0.16" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Terminal prompt glyph -->
  <g id="prompt-glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="m267 251 30 21-30 21" stroke="#1a1b26" stroke-width="17" opacity="0.34"/>
    <path d="m267 251 30 21-30 21" stroke="#fff7ed" stroke-width="11"/>
    <path d="M318 292h34" stroke="#1a1b26" stroke-width="15" opacity="0.28"/>
    <path d="M318 292h34" stroke="#fff7ed" stroke-width="9"/>
  </g>
</svg>
