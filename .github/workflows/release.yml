name: release

# Tag a version (e.g. `git tag v1.0.0 && git push --tags`) to build the .deb and
# publish it to a GitHub Release that users can download — no source needed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libvte-2.91-gtk4-dev libgtksourceview-5-dev

      - name: Build the .deb
        run: ./packaging/build-deb.sh

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
          fail_on_unmatched_files: true
